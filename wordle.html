<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORDLE</title>
  <style>
    body {
      margin: 0;
      background: #121213;
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      padding: 20px 0;
    }
    h1 { font-size: 48px; margin: 10px 0 20px; letter-spacing: 4px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 62px);
      gap: 6px;
      margin: 20px auto;
      width: fit-content;
    }
    .cell {
      width: 62px;
      height: 62px;
      border: 2px solid #3a3a3c;
      font-size: 28px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
    }
    .correct { background: #6aaa64; border-color: #6aaa64; color: white; }
    .present { background: #c9b458; border-color: #c9b458; color: white; }
    .absent { background: #3a3a3c; border-color: #3a3a3c; color: white; }

    .keyboard {
      margin-top: 30px;
    }
    .row {
      display: flex;
      justify-content: center;
      margin: 4px 0;
    }
    .key {
      background: #3a3a3c;
      color: white;
      padding: 12px 14px;
      margin: 0 2px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      min-width: 32px;
    }
    .enter { padding: 12px 20px; }
    .back { padding: 12px 16px; }

    button {
      margin: 30px 0;
      padding: 14px 50px;
      font-size: 20px;
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>WORDLE</h1>

  <div id="startScreen">
    <button onclick="startGame()">Start</button>
  </div>

  <div id="gameScreen" style="display:none;">
    <div class="grid" id="grid"></div>
    <div class="keyboard" id="keyboard"></div>
  </div>

  <div id="winScreen" style="display:none;">
    <h2>You Win!</h2>
    <button onclick="newGame()">Play Again</button>
  </div>

  <script>
    let secretWord = "CRANE";
    let currentRow = 0;
    let gameOver = false;
    const words = ["APPLE","BRAIN","CRANE","DREAM","FLAME","GHOST","HOUSE","LIGHT","MUSIC","NIGHT","OCEAN","PEACE","RIVER","STONE","WORLD","TABLE","PHONE"];

    function startGame() {
      secretWord = words[Math.floor(Math.random() * words.length)];
      currentRow = 0;
      gameOver = false;

      document.getElementById("startScreen").style.display = "none";
      document.getElementById("gameScreen").style.display = "block";
      document.getElementById("winScreen").style.display = "none";

      createGrid();
      createVirtualKeyboard();
    }

    function createGrid() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      for (let i = 0; i < 30; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        grid.appendChild(cell);
      }
    }

    function createVirtualKeyboard() {
      const keyboard = document.getElementById("keyboard");
      keyboard.innerHTML = "";

      const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];

      rows.forEach(row => {
        const div = document.createElement("div");
        div.className = "row";
        for (let letter of row) {
          const key = document.createElement("div");
          key.className = "key";
          key.textContent = letter;
          key.onclick = () => addLetter(letter);
          div.appendChild(key);
        }
        keyboard.appendChild(div);
      });

      // Enter and Backspace
      const lastRow = document.createElement("div");
      lastRow.className = "row";

      const enter = document.createElement("div");
      enter.className = "key enter";
      enter.textContent = "ENTER";
      enter.onclick = checkGuess;
      lastRow.appendChild(enter);

      const back = document.createElement("div");
      back.className = "key back";
      back.textContent = "⌫";
      back.onclick = deleteLetter;
      lastRow.appendChild(back);

      keyboard.appendChild(lastRow);
    }

    function addLetter(letter) {
      if (gameOver) return;
      const cells = document.querySelectorAll("#grid .cell");
      let index = currentRow * 5;
      for (let i = index; i < index + 5; i++) {
        if (!cells[i].textContent) {
          cells[i].textContent = letter;
          return;
        }
      }
    }

    function deleteLetter() {
      if (gameOver) return;
      const cells = document.querySelectorAll("#grid .cell");
      let index = currentRow * 5 + 4;
      for (let i = index; i >= currentRow * 5; i--) {
        if (cells[i].textContent) {
          cells[i].textContent = "";
          return;
        }
      }
    }

    function checkGuess() {
      if (gameOver) return;
      const cells = document.querySelectorAll("#grid .cell");
      let guess = "";
      for (let i = currentRow * 5; i < currentRow * 5 + 5; i++) {
        guess += cells[i].textContent;
      }

      if (guess.length < 5) return;

      // Фарбування
      for (let i = 0; i < 5; i++) {
        const cell = cells[currentRow * 5 + i];
        const letter = guess[i];

        if (letter === secretWord[i]) {
          cell.classList.add("correct");
        } else if (secretWord.includes(letter)) {
          cell.classList.add("present");
        } else {
          cell.classList.add("absent");
        }
      }

      if (guess === secretWord) {
        gameOver = true;
        document.getElementById("gameScreen").style.display = "none";
        document.getElementById("winScreen").style.display = "block";
      } else {
        currentRow++;
        if (currentRow >= 6) {
          gameOver = true;
          alert("Game Over!\nСлово було: " + secretWord);
        }
      }
    }

    function newGame() {
      location.reload();
    }
  </script>
</body>
</html>
